services:
  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    hostname: fahd-pc          # how this device shows up to other Syncthing peers
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Africa/Cairo
    ports:
      # Web UI (8384) is no longer published — it's served via Caddy over HTTPS.
      # The P2P sync + discovery ports below MUST stay published.
      - 22000:22000/tcp      # sync protocol (TCP)
      - 22000:22000/udp      # sync protocol (QUIC)
      - 21027:21027/udp      # local discovery
    volumes:
      - ./config:/var/syncthing/config
      - ./data:/var/syncthing/data   # add folders under here in the web UI
