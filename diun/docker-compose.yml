services:
  diun:
    image: crazymax/diun:latest
    container_name: diun
    restart: unless-stopped
    command: serve
    environment:
      TZ: Africa/Cairo
      LOG_LEVEL: info
      LOG_JSON: "false"
      DIUN_WATCH_WORKERS: 10
      # Check daily at 09:00. Diun is notify-only — it never touches your images.
      DIUN_WATCH_SCHEDULE: 0 9 * * *
      DIUN_WATCH_JITTER: 30s
      DIUN_PROVIDERS_DOCKER: "true"
      # Watch every running container without needing per-container labels.
      DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT: "true"
      # Push alerts via the local ntfy. Both run in the same compose project, so
      # diun reaches ntfy over the shared network at its service name (port 80) —
      # no Tailscale DNS dependency, and ntfy's read-write default access means
      # no token is needed for an internal post. "homelab" is the subscribed topic.
      DIUN_NOTIF_NTFY_ENDPOINT: http://ntfy
      DIUN_NOTIF_NTFY_TOPIC: homelab
      DIUN_NOTIF_NTFY_PRIORITY: 3
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
