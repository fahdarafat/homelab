services:
  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    ports:
      - 7575:7575
    volumes:
      - ./appdata:/appdata
      # Optional: enable live Docker/container widgets later by uncommenting:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
