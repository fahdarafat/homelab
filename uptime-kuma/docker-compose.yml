services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - 3001:3001
    volumes:
      - ./data:/app/data
      # Lets Uptime Kuma also monitor Docker containers directly (optional):
      - /var/run/docker.sock:/var/run/docker.sock
